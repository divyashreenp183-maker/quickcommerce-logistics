<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Commerce Logistics System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .pulse-dot {
            animation: pulse-dot 2s infinite;
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen">
    <!-- Header -->
    <header class="bg-white shadow-lg border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center py-4">
                <div class="flex items-center space-x-3">
                    <i data-lucide="zap" class="w-8 h-8 text-indigo-600"></i>
                    <h1 class="text-2xl font-bold text-gray-900">Quick Commerce Logistics</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <span class="text-sm text-gray-600">10-Minute Delivery System</span>
                    <div class="flex items-center space-x-2">
                        <div class="w-3 h-3 bg-green-500 rounded-full pulse-dot"></div>
                        <span class="text-sm font-medium text-green-600">Live</span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Dashboard Stats -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
            <div class="bg-white rounded-xl shadow-md p-6 hover:shadow-lg transition-shadow">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm font-medium text-gray-600">Total Orders</p>
                        <p class="text-2xl font-bold text-gray-900" id="totalOrders">0</p>
                    </div>
                    <div class="bg-blue-100 p-3 rounded-lg">
                        <i data-lucide="shopping-cart" class="w-6 h-6 text-blue-600"></i>
                    </div>
                </div>
            </div>
            
            <div class="bg-white rounded-xl shadow-md p-6 hover:shadow-lg transition-shadow">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm font-medium text-gray-600">SLA Compliance</p>
                        <p class="text-2xl font-bold text-green-600" id="slaCompliance">0%</p>
                    </div>
                    <div class="bg-green-100 p-3 rounded-lg">
                        <i data-lucide="check-circle" class="w-6 h-6 text-green-600"></i>
                    </div>
                </div>
            </div>
            
            <div class="bg-white rounded-xl shadow-md p-6 hover:shadow-lg transition-shadow">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm font-medium text-gray-600">Available Riders</p>
                        <p class="text-2xl font-bold text-indigo-600" id="availableRiders">0</p>
                    </div>
                    <div class="bg-indigo-100 p-3 rounded-lg">
                        <i data-lucide="users" class="w-6 h-6 text-indigo-600"></i>
                    </div>
                </div>
            </div>
            
            <div class="bg-white rounded-xl shadow-md p-6 hover:shadow-lg transition-shadow">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm font-medium text-gray-600">Total Profit</p>
                        <p class="text-2xl font-bold text-purple-600" id="totalProfit">$0</p>
                    </div>
                    <div class="bg-purple-100 p-3 rounded-lg">
                        <i data-lucide="trending-up" class="w-6 h-6 text-purple-600"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Control Panel -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-8">
            <!-- Create Order -->
            <div class="bg-white rounded-xl shadow-md p-6">
                <h2 class="text-lg font-semibold text-gray-900 mb-4 flex items-center">
                    <i data-lucide="plus-circle" class="w-5 h-5 mr-2 text-indigo-600"></i>
                    Create Order
                </h2>
                <form id="orderForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Customer ID</label>
                        <input type="text" id="customerId" required
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Latitude</label>
                            <input type="number" step="0.0001" id="latitude" required value="40.7128"
                                   class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Longitude</label>
                            <input type="number" step="0.0001" id="longitude" required value="-74.0060"
                                   class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                        </div>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Priority</label>
                        <select id="priority" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                            <option value="normal">Normal</option>
                            <option value="high">High</option>
                            <option value="urgent">Urgent</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Items (JSON)</label>
                        <textarea id="items" rows="3" required
                                  class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                                  placeholder='[{"id": "burger", "quantity": 2, "price": 8.99}]'>[{"id": "burger", "quantity": 2, "price": 8.99}]</textarea>
                    </div>
                    
                    <button type="submit" class="w-full bg-indigo-600 text-white py-2 px-4 rounded-lg hover:bg-indigo-700 transition-colors flex items-center justify-center">
                        <i data-lucide="send" class="w-4 h-4 mr-2"></i>
                        Create Order
                    </button>
                </form>
            </div>

            <!-- Simulation Controls -->
            <div class="bg-white rounded-xl shadow-md p-6">
                <h2 class="text-lg font-semibold text-gray-900 mb-4 flex items-center">
                    <i data-lucide="activity" class="w-5 h-5 mr-2 text-indigo-600"></i>
                    Simulation
                </h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Demand Zone</label>
                        <select id="demandZone" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                            <option value="downtown">Downtown</option>
                            <option value="residential_north">Residential North</option>
                            <option value="residential_south">Residential South</option>
                            <option value="business_district">Business District</option>
                            <option value="university_area">University Area</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Surge Multiplier</label>
                        <input type="number" id="surgeMultiplier" step="0.1" min="1" max="5" value="2"
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                    </div>
                    
                    <button onclick="simulateDemand()" class="w-full bg-green-600 text-white py-2 px-4 rounded-lg hover:bg-green-700 transition-colors flex items-center justify-center">
                        <i data-lucide="zap" class="w-4 h-4 mr-2"></i>
                        Simulate Demand Surge
                    </button>
                    
                    <button onclick="runWhatIf()" class="w-full bg-purple-600 text-white py-2 px-4 rounded-lg hover:bg-purple-700 transition-colors flex items-center justify-center">
                        <i data-lucide="settings" class="w-4 h-4 mr-2"></i>
                        What-If Analysis
                    </button>
                </div>
            </div>

            <!-- Quick Actions -->
            <div class="bg-white rounded-xl shadow-md p-6">
                <h2 class="text-lg font-semibold text-gray-900 mb-4 flex items-center">
                    <i data-lucide="bolt" class="w-5 h-5 mr-2 text-indigo-600"></i>
                    Quick Actions
                </h2>
                <div class="space-y-3">
                    <button onclick="refreshDashboard()" class="w-full bg-gray-100 text-gray-700 py-2 px-4 rounded-lg hover:bg-gray-200 transition-colors flex items-center justify-center">
                        <i data-lucide="refresh-cw" class="w-4 h-4 mr-2"></i>
                        Refresh Dashboard
                    </button>
                    
                    <button onclick="viewOrders()" class="w-full bg-gray-100 text-gray-700 py-2 px-4 rounded-lg hover:bg-gray-200 transition-colors flex items-center justify-center">
                        <i data-lucide="list" class="w-4 h-4 mr-2"></i>
                        View All Orders
                    </button>
                    
                    <button onclick="viewStores()" class="w-full bg-gray-100 text-gray-700 py-2 px-4 rounded-lg hover:bg-gray-200 transition-colors flex items-center justify-center">
                        <i data-lucide="store" class="w-4 h-4 mr-2"></i>
                        View Stores
                    </button>
                    
                    <button onclick="viewRiders()" class="w-full bg-gray-100 text-gray-700 py-2 px-4 rounded-lg hover:bg-gray-200 transition-colors flex items-center justify-center">
                        <i data-lucide="users" class="w-4 h-4 mr-2"></i>
                        View Riders
                    </button>
                </div>
            </div>
        </div>

        <!-- Results Section -->
        <div id="resultsSection" class="hidden">
            <div class="bg-white rounded-xl shadow-md p-6 mb-8">
                <h2 class="text-lg font-semibold text-gray-900 mb-4 flex items-center">
                    <i data-lucide="check-circle" class="w-5 h-5 mr-2 text-green-600"></i>
                    Order Results
                </h2>
                <div id="orderResults" class="space-y-4"></div>
            </div>
        </div>

        <!-- Orders List -->
        <div class="bg-white rounded-xl shadow-md p-6">
            <h2 class="text-lg font-semibold text-gray-900 mb-4 flex items-center">
                <i data-lucide="clipboard-list" class="w-5 h-5 mr-2 text-indigo-600"></i>
                Recent Orders
            </h2>
            <div id="ordersList" class="overflow-x-auto">
                <p class="text-gray-500 text-center py-8">No orders yet. Create your first order above!</p>
            </div>
        </div>
    </main>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-4 right-4 hidden">
        <div class="bg-white rounded-lg shadow-lg p-4 flex items-center space-x-3 min-w-[300px]">
            <div id="toastIcon"></div>
            <div>
                <p id="toastMessage" class="text-sm font-medium text-gray-900"></p>
            </div>
        </div>
    </div>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        // Global variables
        let orders = [];

        // Show toast notification
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            const toastIcon = document.getElementById('toastIcon');
            
            toastMessage.textContent = message;
            
            if (type === 'success') {
                toastIcon.innerHTML = '<i data-lucide="check-circle" class="w-5 h-5 text-green-600"></i>';
            } else if (type === 'error') {
                toastIcon.innerHTML = '<i data-lucide="x-circle" class="w-5 h-5 text-red-600"></i>';
            } else {
                toastIcon.innerHTML = '<i data-lucide="info" class="w-5 h-5 text-blue-600"></i>';
            }
            
            lucide.createIcons();
            
            toast.classList.remove('hidden');
            setTimeout(() => {
                toast.classList.add('hidden');
            }, 3000);
        }

        // Create order
        document.getElementById('orderForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const orderData = {
                customer_id: document.getElementById('customerId').value,
                customer_location: [
                    parseFloat(document.getElementById('latitude').value),
                    parseFloat(document.getElementById('longitude').value)
                ],
                priority: document.getElementById('priority').value,
                items: JSON.parse(document.getElementById('items').value)
            };
            
            try {
                const response = await fetch('/api/orders', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(orderData)
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    showToast('Order created successfully!', 'success');
                    displayOrderResults(result);
                    refreshDashboard();
                    loadOrders();
                } else {
                    showToast(result.error || 'Failed to create order', 'error');
                }
            } catch (error) {
                showToast('Network error', 'error');
            }
        });

        // Display order results
        function displayOrderResults(result) {
            const resultsSection = document.getElementById('resultsSection');
            const orderResults = document.getElementById('orderResults');
            
            const order = result.order;
            const store = result.store;
            const rider = result.rider;
            const profit = result.profit_analysis;
            const slaRisk = result.sla_risk;
            
            orderResults.innerHTML = `
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="space-y-4">
                        <div class="border-l-4 border-blue-500 pl-4">
                            <h3 class="font-semibold text-gray-900">Order Details</h3>
                            <p class="text-sm text-gray-600">ID: ${order.id}</p>
                            <p class="text-sm text-gray-600">Customer: ${order.customer_id}</p>
                            <p class="text-sm text-gray-600">Priority: ${order.priority}</p>
                            <p class="text-sm text-gray-600">Status: <span class="font-medium">${order.status}</span></p>
                            <p class="text-sm text-gray-600">SLA: <span class="${order.sla_met ? 'text-green-600' : 'text-red-600'} font-medium">${order.sla_met ? 'MET' : 'NOT MET'}</span></p>
                        </div>
                        
                        <div class="border-l-4 border-green-500 pl-4">
                            <h3 class="font-semibold text-gray-900">Financials</h3>
                            <p class="text-sm text-gray-600">Revenue: $${profit.revenue.toFixed(2)}</p>
                            <p class="text-sm text-gray-600">Cost: $${profit.cost.toFixed(2)}</p>
                            <p class="text-sm text-gray-600">Profit: <span class="font-medium ${profit.profit > 0 ? 'text-green-600' : 'text-red-600'}">$${profit.profit.toFixed(2)}</span></p>
                            <p class="text-sm text-gray-600">Margin: ${profit.profit_margin.toFixed(1)}%</p>
                        </div>
                    </div>
                    
                    <div class="space-y-4">
                        <div class="border-l-4 border-purple-500 pl-4">
                            <h3 class="font-semibold text-gray-900">Assignments</h3>
                            <p class="text-sm text-gray-600">Store: ${store.name}</p>
                            <p class="text-sm text-gray-600">Rider: ${rider.name}</p>
                            <p class="text-sm text-gray-600">Est. Delivery: ${new Date(order.estimated_delivery_time).toLocaleTimeString()}</p>
                        </div>
                        
                        <div class="border-l-4 border-orange-500 pl-4">
                            <h3 class="font-semibold text-gray-900">AI Decision</h3>
                            <p class="text-sm text-gray-600 whitespace-pre-line">${order.decision_explanation}</p>
                            ${order.recommendations.length > 0 ? `
                                <div class="mt-2">
                                    <p class="text-sm font-medium text-gray-700">Recommendations:</p>
                                    <ul class="text-sm text-gray-600 list-disc list-inside">
                                        ${order.recommendations.map(rec => `<li>${rec}</li>`).join('')}
                                    </ul>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `;
            
            resultsSection.classList.remove('hidden');
        }

        // Load orders
        async function loadOrders() {
            try {
                const response = await fetch('/api/orders');
                orders = await response.json();
                displayOrders();
            } catch (error) {
                console.error('Failed to load orders:', error);
            }
        }

        // Display orders
        function displayOrders() {
            const ordersList = document.getElementById('ordersList');
            
            if (orders.length === 0) {
                ordersList.innerHTML = '<p class="text-gray-500 text-center py-8">No orders yet. Create your first order above!</p>';
                return;
            }
            
            const tableHTML = `
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Order ID</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Customer</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Store</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Rider</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">SLA</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Profit</th>
                        </tr>
                    </thead>
                    <tbody class="bg-white divide-y divide-gray-200">
                        ${orders.map(order => `
                            <tr class="hover:bg-gray-50">
                                <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${order.id.substring(0, 8)}...</td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${order.customer_id}</td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${order.assigned_store_id || 'Unassigned'}</td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${order.assigned_rider_id || 'Unassigned'}</td>
                                <td class="px-6 py-4 whitespace-nowrap">
                                    <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-blue-100 text-blue-800">
                                        ${order.status}
                                    </span>
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap">
                                    <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${order.sla_met ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}">
                                        ${order.sla_met ? 'MET' : 'MISS'}
                                    </span>
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">$${order.profit.toFixed(2)}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            
            ordersList.innerHTML = tableHTML;
        }

        // Refresh dashboard
        async function refreshDashboard() {
            try {
                const response = await fetch('/api/analytics/dashboard');
                const data = await response.json();
                
                document.getElementById('totalOrders').textContent = data.total_orders;
                document.getElementById('slaCompliance').textContent = `${data.sla_compliance_rate.toFixed(1)}%`;
                document.getElementById('availableRiders').textContent = `${data.available_riders}/${data.total_riders}`;
                document.getElementById('totalProfit').textContent = `$${data.total_profit.toFixed(2)}`;
            } catch (error) {
                console.error('Failed to refresh dashboard:', error);
            }
        }

        // Simulate demand
        async function simulateDemand() {
            const zone = document.getElementById('demandZone').value;
            const multiplier = parseFloat(document.getElementById('surgeMultiplier').value);
            
            try {
                const response = await fetch('/api/demand/simulate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        zone: zone,
                        multiplier: multiplier,
                        duration_minutes: 30
                    })
                });
                
                const result = await response.json();
                showToast(`Generated ${result.generated_orders} orders for ${zone} surge!`, 'success');
                loadOrders();
                refreshDashboard();
            } catch (error) {
                showToast('Failed to simulate demand', 'error');
            }
        }

        // Run what-if analysis
        async function runWhatIf() {
            try {
                const response = await fetch('/api/simulation/what-if', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        type: 'demand_surge',
                        zone: document.getElementById('demandZone').value,
                        multiplier: parseFloat(document.getElementById('surgeMultiplier').value),
                        duration_minutes: 30
                    })
                });
                
                const result = await response.json();
                showToast('What-if analysis completed!', 'info');
                console.log('What-if results:', result);
            } catch (error) {
                showToast('Failed to run what-if analysis', 'error');
            }
        }

        // View functions
        async function viewOrders() {
            await loadOrders();
            document.getElementById('ordersList').scrollIntoView({ behavior: 'smooth' });
        }

        async function viewStores() {
            try {
                const response = await fetch('/api/stores');
                const stores = await response.json();
                console.log('Stores:', stores);
                showToast('Stores data loaded (check console)', 'info');
            } catch (error) {
                showToast('Failed to load stores', 'error');
            }
        }

        async function viewRiders() {
            try {
                const response = await fetch('/api/riders');
                const riders = await response.json();
                console.log('Riders:', riders);
                showToast('Riders data loaded (check console)', 'info');
            } catch (error) {
                showToast('Failed to load riders', 'error');
            }
        }

        // Initialize dashboard on load
        document.addEventListener('DOMContentLoaded', () => {
            refreshDashboard();
            loadOrders();
        });
    </script>
</body>
</html>
